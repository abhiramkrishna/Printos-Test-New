    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #ffffff;
            color: #0f172a;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }

        .path-draw {
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: draw 2s ease-in-out forwards;
        }

        @keyframes draw {
            to {
                stroke-dashoffset: 0;
            }
        }

        .orbit-track {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 1px dashed #e2e8f0;
            border-radius: 50%;
        }

        .orbit-anim {
            animation: spin linear infinite;
        }

        .orbit-reverse {
            animation: spin-reverse linear infinite;
        }

        @keyframes spin {
            100% {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }

        @keyframes spin-reverse {
            100% {
                transform: rotate(-360deg);
            }
        }

        .img-reveal {
            clip-path: inset(100% 0 0 0);
        }

        .btn-hover {
            transition: all 0.3s ease;
        }

        .btn-hover:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px -5px rgba(45, 158, 216, 0.4);
        }

        .mega-menu-panel {
            animation: slideDown 0.2s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes scroll-left {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(-50%);
            }
        }

        .marquee-track {
            display: flex;
            width: max-content;
            animation: scroll-left 40s linear infinite;
        }

        .marquee-track:hover {
            animation-play-state: paused;
        }

        .material-symbols-rounded {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            vertical-align: middle;
            line-height: 1;
        }

        .star-filled {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .testimonial-swiper .swiper-pagination-bullet {
            background: #cbd5e1;
            opacity: 0.5;
        }

        .testimonial-swiper .swiper-pagination-bullet-active {
            background: #2D9ED8;
            opacity: 1;
        }

        .service-badge {
            background: rgba(45, 158, 216, 0.08);
            border: 1px solid rgba(45, 158, 216, 0.15);
        }
    </style>
</head>

        function Preloader({ onComplete }) {

        // ─── HERO MASONRY ─────────────────────────────────────────────────────────
        function HeroMasonry() {
            const [activeIdx, setActiveIdx] = useState(3);
            const autoRef = useRef(null);
            const canvasRef = useRef(null);

            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas || !window.THREE) return;
                const T = window.THREE;
                const W = canvas.offsetWidth || window.innerWidth;
                const H = canvas.offsetHeight || window.innerHeight;
                const scene = new T.Scene();
                const camera = new T.OrthographicCamera(-1, 1, 1, -1, 0, 1);
                const renderer = new T.WebGLRenderer({ canvas, alpha: true, antialias: false });
                renderer.setSize(W, H);
                renderer.setPixelRatio(1);
                renderer.setClearColor(0x000000, 0);

                const vertSrc = `varying vec2 vUv; void main() { vUv = uv; gl_Position = vec4(position, 1.0); }`;
                const fragSrc = `
                    precision highp float;
                    uniform float u_time;
                    uniform vec2  u_mouse;
                    uniform vec2  u_res;
                    varying vec2  vUv;
                    void main() {
                        float aspect = u_res.x / u_res.y;
                        vec2 uv = vec2(vUv.x * aspect, vUv.y);
                        float cols = 55.0;
                        float cellSz = aspect / cols;
                        vec2  cellUV = uv / cellSz;
                        vec2  cellId = floor(cellUV);
                        vec2  cell   = fract(cellUV) - 0.5;
                        vec2 centre = (cellId + 0.5) * cellSz;
                        vec2 mouseUV = vec2((u_mouse.x * 0.5 + 0.5) * aspect, u_mouse.y * 0.5 + 0.5);
                        float dMouse = length(centre - mouseUV);
                        float wave   = sin(dMouse * 38.0 - u_time * 4.2);
                        float fade   = exp(-dMouse * 3.8);
                        float ripple = wave * fade;
                        float breath = sin(u_time * 0.55 + cellId.x * 0.18 + cellId.y * 0.22) * 0.5 + 0.5;
                        float r = clamp(0.13 + breath * 0.04 + ripple * 0.13, 0.03, 0.30);
                        float dist    = length(cell);
                        float dotMask = 1.0 - smoothstep(r - 0.015, r + 0.015, dist);
                        float ci = mod(cellId.x * 3.0 + cellId.y * 7.0, 4.0);
                        vec3 tint;
                        if      (ci < 1.0) tint = vec3(0.18, 0.62, 0.85);
                        else if (ci < 2.0) tint = vec3(0.55, 0.36, 0.97);
                        else if (ci < 3.0) tint = vec3(0.98, 0.45, 0.09);
                        else               tint = vec3(0.06, 0.73, 0.51);
                        float visibility = clamp(0.10 + breath * 0.04 + max(0.0, ripple) * fade * 0.35, 0.0, 0.55);
                        vec3 bg    = vec3(0.965, 0.975, 0.990);
                        vec3 color = mix(bg, tint * 0.55 + vec3(0.42), dotMask * visibility);
                        gl_FragColor = vec4(color, 1.0);
                    }
                `;
                const uniforms = {
                    u_time: { value: 0.0 },
                    u_mouse: { value: new T.Vector2(0.0, 0.0) },
                    u_res: { value: new T.Vector2(W, H) },
                };
                const geo = new T.PlaneGeometry(2, 2);
                const mat = new T.ShaderMaterial({ vertexShader: vertSrc, fragmentShader: fragSrc, uniforms, transparent: true, depthWrite: false });
                scene.add(new T.Mesh(geo, mat));

                const target = { x: 0, y: 0 };
                const current = { x: 0, y: 0 };
                const onMove = (e) => {
                    const r = canvas.getBoundingClientRect();
                    target.x = ((e.clientX - r.left) / r.width) * 2 - 1;
                    target.y = -((e.clientY - r.top) / r.height) * 2 + 1;
                };
                window.addEventListener('mousemove', onMove);
                let raf;
                const clock = new T.Clock();
                const animate = () => {
                    raf = requestAnimationFrame(animate);
                    current.x += (target.x - current.x) * 0.04;
                    current.y += (target.y - current.y) * 0.04;
                    uniforms.u_time.value = clock.getElapsedTime();
                    uniforms.u_mouse.value.set(current.x, current.y);
                    renderer.render(scene, camera);
                };
                animate();
                const onResize = () => {
                    renderer.setSize(canvas.offsetWidth, canvas.offsetHeight);
                    uniforms.u_res.value.set(canvas.offsetWidth, canvas.offsetHeight);
                };
                window.addEventListener('resize', onResize);
                return () => {
                    cancelAnimationFrame(raf);
                    window.removeEventListener('mousemove', onMove);
                    window.removeEventListener('resize', onResize);
                    renderer.dispose(); geo.dispose(); mat.dispose();
                };
            }, []);

            const startAuto = () => {
                clearInterval(autoRef.current);
                autoRef.current = setInterval(() =>
                    setActiveIdx(prev => (prev + 1) % HERO_CARDS.length), 3000);
            };
            useEffect(() => { startAuto(); return () => clearInterval(autoRef.current); }, []);

            const handleCardClick = (idx) => { setActiveIdx(idx); startAuto(); };

            const dragStart = useRef(null);
            const handleDragStart = (e) => { dragStart.current = e.clientX ?? e.touches?.[0]?.clientX; };
            const handleDragEnd = (e) => {
                const end = e.clientX ?? e.changedTouches?.[0]?.clientX;
                if (dragStart.current === null || end === undefined) return;
                const diff = end - dragStart.current;
                if (Math.abs(diff) > 40) {
                    setActiveIdx(prev => diff < 0
                        ? (prev + 1) % HERO_CARDS.length
                        : (prev - 1 + HERO_CARDS.length) % HERO_CARDS.length);
                    startAuto();
                }
                dragStart.current = null;
            };

            const visibleCards = HERO_CARDS.map((card, i) => {
                const wrap = HERO_CARDS.length;
                let norm = ((i - activeIdx + Math.floor(wrap / 2)) % wrap + wrap) % wrap - Math.floor(wrap / 2);
                return { card, i, offset: norm };
            }).filter(({ offset }) => Math.abs(offset) <= 2);

            return (
                <section id="about"
                    className="relative w-full flex flex-col items-center overflow-hidden z-0"
                    style={{ minHeight: '100vh', background: 'linear-gradient(160deg,#f0f8ff 0%,#fafafa 50%,#fff8f0 100%)', paddingTop: '120px' }}
                >
                    {/* Three.js canvas */}
                    <canvas ref={canvasRef} style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', zIndex: 0, pointerEvents: 'none', display: 'block' }} />
                    {/* Ambient blobs */}
                    <div style={{ position: 'absolute', top: '5%', left: '8%', width: 340, height: 340, borderRadius: '50%', background: 'radial-gradient(circle,rgba(45,158,216,0.10) 0%,transparent 70%)', filter: 'blur(40px)', pointerEvents: 'none' }} />
                    <div style={{ position: 'absolute', top: '15%', right: '6%', width: 260, height: 260, borderRadius: '50%', background: 'radial-gradient(circle,rgba(139,92,246,0.09) 0%,transparent 70%)', filter: 'blur(40px)', pointerEvents: 'none' }} />
                    <div style={{ position: 'absolute', bottom: '10%', left: '15%', width: 200, height: 200, borderRadius: '50%', background: 'radial-gradient(circle,rgba(245,158,11,0.08) 0%,transparent 70%)', filter: 'blur(35px)', pointerEvents: 'none' }} />

                    {/* Hero text */}
                    <div className="text-center px-6" style={{ position: 'relative', zIndex: 10 }}>
                        <h1 style={{ fontSize: 'clamp(2.4rem,6vw,4.8rem)', fontWeight: 700, lineHeight: 1.08, letterSpacing: '-1.5px', color: '#0f172a', margin: 0 }}>
                            Elevate Yourself With<br />
                            <span style={{ color: '#2D9ED8' }}>Printos</span>
                        </h1>
                    </div>

                    {/* Card Carousel */}
                    <div
                        style={{ position: 'relative', width: '100%', height: 'clamp(370px,40vw,430px)', marginTop: '24px', display: 'flex', alignItems: 'center', justifyContent: 'center', userSelect: 'none' }}
                        onMouseDown={handleDragStart} onMouseUp={handleDragEnd}
                        onTouchStart={handleDragStart} onTouchEnd={handleDragEnd}
                    >
                        {visibleCards.map(({ card, i, offset }) => (
                            <StampCard key={card.id} card={card} isActive={i === activeIdx} offset={offset} onClick={() => handleCardClick(i)} />
                        ))}
                    </div>

                    {/* Dot indicators */}
                    <div style={{ display: 'flex', gap: '10px', marginTop: '18px', position: 'relative', zIndex: 10 }}>
                        {HERO_CARDS.map((c, i) => (
                            <button key={c.id} onClick={() => handleCardClick(i)} aria-label={`Go to ${c.label}`}
                                style={{ width: i === activeIdx ? '28px' : '8px', height: '8px', borderRadius: '999px', background: i === activeIdx ? (HERO_CARDS[activeIdx]?.color || '#2D9ED8') : '#cbd5e1', border: 'none', cursor: 'pointer', padding: 0, transition: 'all 0.4s cubic-bezier(0.34,1.56,0.64,1)' }}
                            />
                        ))}
                    </div>

                    {/* CTA */}
                    <div style={{ marginTop: '22px', position: 'relative', zIndex: 10 }}>
                        <a href="#"
                            style={{ display: 'inline-flex', alignItems: 'center', gap: '8px', background: HERO_CARDS[activeIdx]?.color || '#2D9ED8', color: 'white', fontWeight: 700, fontSize: '15px', padding: '13px 32px', borderRadius: '999px', boxShadow: `0 12px 30px -8px ${HERO_CARDS[activeIdx]?.color || '#2D9ED8'}66`, textDecoration: 'none', transition: 'all 0.4s cubic-bezier(0.34,1.56,0.64,1)', letterSpacing: '-0.2px' }}
                            onMouseOver={e => { e.currentTarget.style.transform = 'translateY(-3px) scale(1.04)'; }}
                            onMouseOut={e => { e.currentTarget.style.transform = 'none'; }}
                        >
                            Shop {HERO_CARDS[activeIdx]?.label}
                            <span className="material-symbols-rounded" style={{ fontSize: '20px' }}>arrow_forward</span>
                        </a>
                    </div>

                    {/* Spacer so sections below aren't covered */}
                    <div style={{ height: '40px' }} />
                </section>
            );
        }

        // ─── NEW LAUNCHES ─────────────────────────────────────────────────────────
        function NewLaunches() {
            useLayoutEffect(() => {
                gsap.fromTo(".launch-card", { opacity: 0, y: 30 }, { opacity: 1, y: 0, duration: 0.7, stagger: 0.1, scrollTrigger: { trigger: ".launches-section", start: "top 75%" } });
            }, []);

            return (
                <section className="launches-section py-24 px-6 max-w-7xl mx-auto">
                    <div className="flex justify-between items-end mb-12">
                        <div>
                            <span className="text-brand font-bold tracking-widest uppercase text-xs mb-3 block">Just Dropped</span>
                            <h2 className="text-4xl md:text-5xl font-medium tracking-tighter text-dark">New Launches</h2>
                        </div>
                        <button className="text-brand font-semibold text-sm flex items-center gap-1 hover:gap-3 transition-all">
                            View All <span className="material-symbols-rounded text-lg">arrow_forward</span>
                        </button>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
                        {NEW_LAUNCHES.map((item, i) => (
                            <div key={item.id} className="launch-card group flex items-center gap-5 p-5 bg-gray-50 rounded-3xl border border-gray-100 hover:border-brand/30 hover:shadow-lg transition-all duration-500 cursor-pointer" style={{ transitionDelay: `${i * 50}ms` }}>
                                <div className="w-24 h-24 rounded-2xl overflow-hidden flex-shrink-0">
                                    <img src={item.image} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" alt={item.title} />
                                </div>
                                <div className="flex-1">
                                    <span className="text-[10px] font-extrabold uppercase tracking-widest text-brand block mb-1">New Arrival</span>
                                    <h4 className="font-semibold text-dark group-hover:text-brand transition-colors text-lg leading-snug">{item.title}</h4>
                                </div>
                                <div className="opacity-0 group-hover:opacity-100 transition-opacity text-brand">
                                    <span className="material-symbols-rounded">arrow_forward</span>
                                </div>
                            </div>
                        ))}
                        {/* Promo card */}
                        <div className="launch-card group bg-brand rounded-3xl p-8 flex flex-col justify-center relative overflow-hidden cursor-pointer text-white col-span-1 md:col-span-2 lg:col-span-1">
                            <div className="absolute -right-8 -top-8 w-40 h-40 bg-white/20 rounded-full blur-2xl group-hover:bg-white/30 transition-all"></div>
                            <span className="text-[10px] font-bold uppercase tracking-widest bg-white/20 px-3 py-1 rounded-full w-fit mb-4">Limited Time</span>
                            <h4 className="text-3xl font-bold mb-3">Summer Sale!</h4>
                            <p className="text-white/80 mb-6 font-medium">Up to 30% off on all new arrivals this week.</p>
                            <button className="bg-white text-brand font-bold py-2.5 px-6 rounded-full w-fit text-sm hover:scale-105 transition-transform">Shop Collection</button>
                        </div>
                    </div>
                </section>
            );
        }

        // ─── BEST SELLERS ─────────────────────────────────────────────────────────
        function BestSellers() {
            const swiperRef = useRef(null);
            const chunked = [];
            for (let i = 0; i < BEST_SELLERS.length; i += 4) chunked.push(BEST_SELLERS.slice(i, i + 4));

            useEffect(() => {
                swiperRef.current = new Swiper('.bestseller-swiper', { slidesPerView: 1, spaceBetween: 40, loop: true, speed: 800, autoplay: { delay: 5000, disableOnInteraction: false }, navigation: { nextEl: '.bs-next', prevEl: '.bs-prev' } });
                return () => { if (swiperRef.current?.destroy) swiperRef.current.destroy(true, true); };
            }, []);

            return (
                <section className="py-24 px-6 bg-gray-50">
                    <div className="max-w-7xl mx-auto">
                        <div className="text-center mb-12">
                            <span className="text-brand font-bold tracking-widest uppercase text-xs mb-3 block">Top Picks</span>
                            <h2 className="text-4xl md:text-5xl font-medium tracking-tighter text-dark">Best Sellers</h2>
                            <p className="text-gray-500 mt-4 font-medium max-w-xl mx-auto">Our most loved and highest-rated prints, curated for your success.</p>
                        </div>
                        <div className="relative max-w-5xl mx-auto group/slider">
                            <button className="bs-prev absolute left-0 top-1/2 -translate-y-1/2 -translate-x-8 w-12 h-12 bg-white rounded-full shadow-md flex items-center justify-center z-20 text-dark hover:text-brand transition-colors">
                                <span className="material-symbols-rounded">chevron_left</span>
                            </button>
                            <button className="bs-next absolute right-0 top-1/2 -translate-y-1/2 translate-x-8 w-12 h-12 bg-white rounded-full shadow-md flex items-center justify-center z-20 text-dark hover:text-brand transition-colors">
                                <span className="material-symbols-rounded">chevron_right</span>
                            </button>
                            <div className="swiper bestseller-swiper">
                                <div className="swiper-wrapper">
                                    {chunked.map((chunk, si) => (
                                        <div key={si} className="swiper-slide">
                                            <div className="grid grid-cols-2 grid-rows-3 gap-4 h-[600px]">
                                                {chunk.map((item, idx) => {
                                                    let cls = "";
                                                    if (idx === 0) cls = "col-start-1 row-start-1 row-span-2";
                                                    if (idx === 1) cls = "col-start-1 row-start-3 row-span-1";
                                                    if (idx === 2) cls = "col-start-2 row-start-1 row-span-1";
                                                    if (idx === 3) cls = "col-start-2 row-start-2 row-span-2";
                                                    return (
                                                        <div key={item.id} className={`${cls} relative group rounded-3xl overflow-hidden shadow-sm hover:shadow-xl transition-all duration-500`}>
                                                            <img src={item.image} alt={item.title} className="absolute inset-0 w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" />
                                                            <div className="absolute inset-0 bg-gradient-to-t from-black/70 via-transparent to-transparent opacity-60 group-hover:opacity-90 transition-opacity" />
                                                            <div className="absolute bottom-0 left-0 right-0 p-5">
                                                                <h3 className="text-white font-semibold text-lg drop-shadow-md transform translate-y-2 group-hover:translate-y-0 transition-transform">{item.title}</h3>
                                                                <div className="h-0 overflow-hidden opacity-0 group-hover:h-auto group-hover:opacity-100 group-hover:mt-3 transition-all flex gap-3">
                                                                    <button className="bg-white text-dark text-xs font-bold px-5 py-2 rounded-full hover:bg-brand hover:text-white transition-colors">Shop Now</button>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            );
        }

        // ─── WHY CHOOSE US ────────────────────────────────────────────────────────
        const WHY_CHOOSE_US = [
            { id: "01", title: "Fast Turn Around", desc: "Get your prints delivered when you need them.", icon: "bolt", color: "#22C55E", bg: "#f0fff4" },
            { id: "02", title: "Easy Ordering",     desc: "Seamless and hassle-free online checkout.",   icon: "touch_app", color: "#F97316", bg: "#fff7ed" },
            { id: "03", title: "Nationwide Quality", desc: "Consistent, premium printing across the board.", icon: "verified", color: "#3B82F6", bg: "#eff6ff" },
            { id: "04", title: "Wide Product Range", desc: "Everything you need, all in one place.",        icon: "category", color: "#EC4899", bg: "#fdf2f8" }
        ];

        function WhyChooseUs() {
            useLayoutEffect(() => {
                gsap.fromTo(".pin-card", 
                    { y: 60, opacity: 0, rotate: -2 }, 
                    { y: 0, opacity: 1, rotate: 0, duration: 1, stagger: 0.15, ease: "power3.out", scrollTrigger: { trigger: "#why-choose-us", start: "top 75%" } }
                );
            }, []);

            return (
                <section id="why-choose-us" className="py-32 bg-gray-50/50 px-6 relative overflow-hidden">
                    <div className="max-w-7xl mx-auto">
                        <div className="text-center mb-20">
                            <span className="text-brand font-bold tracking-widest uppercase text-xs mb-3 block">Our Values</span>
                            <h2 className="text-4xl md:text-6xl font-medium tracking-tighter text-dark">Why Choose Us?</h2>
                        </div>
                        
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
                            {WHY_CHOOSE_US.map((item) => (
                                <div key={item.id} className="pin-card group relative bg-white rounded-[2rem] p-10 pt-14 shadow-xl shadow-gray-200/50 hover:shadow-2xl hover:-translate-y-2 transition-all duration-500">
                                    {/* Push Pin */}
                                    <div className="absolute -top-3 left-1/2 -translate-x-1/2 w-8 h-8 rounded-full shadow-lg z-20" 
                                         style={{ 
                                             background: `radial-gradient(circle at 30% 30%, ${item.color}, #000 150%)`,
                                             boxShadow: `0 4px 10px ${item.color}44`
                                         }}>
                                        <div className="absolute top-1 left-1.5 w-2 h-2 bg-white/30 rounded-full blur-[1px]"></div>
                                    </div>

                                    {/* Content */}
                                    <div className="flex justify-between items-start mb-6">
                                        <span className="text-4xl font-black italic opacity-20" style={{ color: item.color }}>{item.id}</span>
                                        <div className="w-12 h-12 rounded-2xl flex items-center justify-center" style={{ backgroundColor: item.bg, color: item.color }}>
                                            <span className="material-symbols-rounded text-2xl">{item.icon}</span>
                                        </div>
                                    </div>
                                    
                                    <h4 className="text-xl font-bold text-dark mb-3 leading-tight">{item.title}</h4>
                                    <p className="text-gray-500 text-sm leading-relaxed">{item.desc}</p>
                                    
                                    {/* Bottom Accent */}
                                    <div className="absolute bottom-0 left-0 right-0 h-1.5 rounded-b-[2rem] opacity-0 group-hover:opacity-100 transition-opacity" style={{ backgroundColor: item.color }}></div>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        }

        // ─── ORBIT TESTIMONIALS ───────────────────────────────────────────────────
        // ─── TESTIMONIALS (Elfsight Google Reviews) ─────────────────────────────────────────
        function OrbitTestimonials() {
            return (
                <section className="py-24 px-6 bg-white">
                    <div className="max-w-6xl mx-auto">
                        <div className="text-center mb-12">
                            <span className="text-brand font-bold tracking-widest uppercase text-xs mb-3 block">Testimonials</span>
                            <h2 className="text-4xl md:text-5xl font-medium tracking-tighter text-dark">
                                What Our Clients Say
                            </h2>
                        </div>
                        <div className="elfsight-app-35f7b210-eb05-46ae-8f32-2c80de3bd8ba" data-elfsight-app-lazy></div>
                    </div>
                </section>
            );
        }


        // ─── FOOTER ───────────────────────────────────────────────────────────────
        function Footer() {
            return (
                <footer className="relative py-32 bg-gray-50 overflow-hidden flex flex-col items-center justify-center text-center px-6">
                    <div className="absolute inset-0 opacity-[0.07]" style={{ backgroundImage: 'radial-gradient(#2D9ED8 2px, transparent 2px)', backgroundSize: '30px 30px' }}></div>
                    <div className="relative z-10 mb-20">
                        <div className="flex items-center justify-center gap-3 mb-10">
                            <LOGO className="w-12 h-14" />
                            <span className="text-4xl font-bold tracking-tighter text-dark">Printos</span>
                        </div>
                        <h2 className="text-4xl md:text-5xl font-medium tracking-tighter text-dark mb-6">Let's Create Together</h2>
                        <a href="mailto:printostvm@gmail.com" className="text-2xl md:text-4xl font-light text-gray-400 hover:text-brand transition-colors">printostvm@gmail.com</a>
                    </div>
                    {/* Map */}
                    <div className="relative z-10 w-full max-w-3xl mx-auto mb-16">
                        <div className="w-full h-[200px] rounded-4xl overflow-hidden border border-gray-200 shadow-sm">
                            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3945.989774549804!2d76.9489795!3d8.5003727!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3b05bbd52d5d2d5d%3A0xc013d20635c5acab!2sPrintos%20tvm!5e0!3m2!1sen!2sae!4v1773801936162!5m2!1sen!2sae" width="100%" height="100%" style={{ border: 0 }} allowFullScreen loading="lazy"></iframe>
                        </div>
                    </div>
                    <div className="relative z-10 w-full max-w-7xl flex flex-col md:flex-row justify-between items-center gap-6 text-sm text-gray-400 font-medium border-t border-gray-200 pt-8">
                        <span>© 2026 Printos. All rights reserved.</span>
                        <div className="flex gap-8">
                            <a href="#" className="hover:text-dark transition-colors">Instagram</a>
                            <a href="#" className="hover:text-dark transition-colors">LinkedIn</a>
                            <a href="#" className="hover:text-dark transition-colors">WhatsApp</a>
                        </div>
                    </div>
                </footer>
            );
        }

        // ─── APP ──────────────────────────────────────────────────────────────────
        function App() {
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                if (!loading) {
                    window.scrollTo(0, 0);
                    setTimeout(() => ScrollTrigger.refresh(), 300);
                }
            }, [loading]);

            return (
                <div className="w-full">
                    {loading && <Preloader onComplete={() => setLoading(false)} />}
                    <div className={loading ? "h-screen overflow-hidden" : ""}>
                        <Header />
                        <main>
                            <HeroMasonry />
                            <Statement />
                            <ClientMarquee />
                            <Services />
                            <BentoGrid />
                            <NewLaunches />
                            <BestSellers />
                            <OrbitTestimonials />
                            <WhyChooseUs />
                        </main>
                        <Footer />
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>

</html>
